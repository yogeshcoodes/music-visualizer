<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Audio Visualizer – Dark Material You</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Recording overlay -->
    <div id="recording-overlay" class="overlay hidden">
        <div class="overlay-content">
            <h2>Recording video…</h2>
            <div class="progress-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
            <p id="progress-text" class="progress-text">0%</p>
            <button id="cancel-record-btn" class="btn btn-danger">Cancel recording</button>
        </div>
    </div>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="brand">
                               Vintage Visualizer Pro
            </div>

            <!-- Sample Audio -->
            <div class="control-group">
                <span class="group-label">Audio</span>
                <audio id="main-audio" src="assets/sample-1.mp3" crossorigin="anonymous" class="hidden"></audio>

                <div class="custom-player">
                    <button id="play-pause-btn" class="icon-btn play-btn" aria-label="Play / Pause">
                        <svg id="icon-play" xmlns="http://www.w3.org/2000/svg" height="42" viewBox="0 -960 960 960" width="42" fill="currentColor"><path d="M320-200v-560l440 280-440 280Z"/></svg>
                        <svg id="icon-pause" class="hidden" xmlns="http://www.w3.org/2000/svg" height="42" viewBox="0 -960 960 960" width="42" fill="currentColor"><path d="M560-200v-560h160v560H560Zm-320 0v-560h160v560H240Z"/></svg>
                    </button>
                    <div class="player-bar">
                        <input type="range" id="seek-bar" value="0" min="0" max="100" step="0.1" class="slider">
                    </div>
                    <div class="time-display">
                        <span id="current-time">0:00</span>
                        <span class="time-sep">/</span>
                        <span id="duration">0:00</span>
                    </div>
                </div>

                <label class="btn btn-upload">
                    <svg xmlns="http://www.w3.org/2000/svg" height="22" viewBox="0 -960 960 960" width="22" fill="currentColor"><path d="M440-320v-326L336-542l-56-58 200-200 200 200-56 58-104-104v326h-80ZM240-160q-33 0-56.5-23.5T160-240v-120h80v120h480v-120h80v120q0 33-23.5 56.5T720-160H240Z"/></svg>
                    Upload audio
                    <input type="file" id="audio-upload" accept="audio/*, video/mp4">
                </label>
            </div>

            <!-- Visualization pattern -->
            <div class="control-group">
                <span class="group-label">Visualization</span>
                <div class="select-wrapper">
                    <select id="pattern-select" class="dropdown">
                        <option value="patterns/pattern-1.html">Pattern 1</option>
                        <option value="patterns/pattern-2.html">Pattern 2</option>
                        <option value="patterns/pattern-3.html">Pattern 3</option>
                        <option value="patterns/pattern-4.html">Pattern 4</option>
                        <option value="patterns/pattern-5.html">Pattern 5</option>
                        <option value="patterns/pattern-6.html">Pattern 6</option>
                        <option value="patterns/pattern-7.html">Pattern 7</option>
                        <option value="patterns/pattern-8.html">Pattern 8</option>
                        <option value="patterns/pattern-9.html">Pattern 9</option>
                        <option value="patterns/pattern-10.html">Pattern 10</option>
                    </select>
                </div>
            </div>

            <!-- Export settings -->
            <div class="control-group">
                <span class="group-label">Export Settings</span>
                <div class="select-wrapper">
                    <select id="aspect-ratio" class="dropdown">
                        <option value="16:9">Landscape (16:9)</option>
                        <option value="9:16">Portrait (9:16)</option>
                        <option value="1:1">Square (1:1)</option>
                    </select>
                </div>
                <button id="record-btn" class="btn btn-record">
                    <svg xmlns="http://www.w3.org/2000/svg" height="22" viewBox="0 -960 960 960" width="22" fill="currentColor"><path d="M160-160q-33 0-56.5-23.5T80-240v-480q0-33 23.5-56.5T160-800h480q33 0 56.5 23.5T720-720v180l160-160v440L720-420v180q0 33-23.5 56.5T640-160H160Zm0-80h480v-480H160v480Zm0 0v-480 480Z"/></svg>
                    Record Complete Video
                </button>
            </div>
        </aside>

        <!-- Main visualizer area -->
        <main class="visualizer-container">
            <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Toggle sidebar">
                <svg xmlns="http://www.w3.org/2000/svg" height="26" viewBox="0 -960 960 960" width="26" fill="currentColor"><path d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z"/></svg>
            </button>
            <div class="canvas-wrapper aspect-16-9" id="wrapper">
                <iframe id="pattern-frame" src="patterns/pattern-1.html" frameborder="0" title="Visualization pattern"></iframe>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
