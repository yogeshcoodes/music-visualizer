<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        * { margin: 0; padding: 0; }
        body { background: transparent; overflow: hidden; }
        canvas { display: block; width: 100vw; height: 100vh; background-color: #000; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function draw() {
            requestAnimationFrame(draw);
            
            // Clear the background
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const data = window.parent.getVisualizerData ? window.parent.getVisualizerData() : null;
            
            // Set up the styling for the smooth wave
            ctx.lineWidth = 4; // Thick, solid line
            ctx.strokeStyle = '#ffffff'; 
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.shadowBlur = 0; 
            
            const centerY = canvas.height / 2;
            ctx.beginPath();
            
            // Resting state: flat line
            if (!data || !data.frequencyData) {
                ctx.moveTo(0, centerY);
                ctx.lineTo(canvas.width, centerY);
                ctx.stroke();
                return;
            }

            const freqData = data.frequencyData;
            
            // We'll use about 100 bins to keep the wave broad and smooth
            const activeBins = 100; 
            const sliceWidth = canvas.width / (activeBins - 1);
            
            // 1. Calculate all the target points first
            let points = [];
            for (let i = 0; i < activeBins; i++) {
                const value = freqData[i];
                
                // Normalize the value between 0 and 1
                const normalized = value / 255;
                
                // MATH TRICK: By squaring or cubing the normalized value, we suppress 
                // low-volume noise (keeping the line flat) while allowing loud beats 
                // to peak up sharply, matching the aesthetic of your image.
                const smoothedValue = Math.pow(normalized, 3); 
                
                const height = smoothedValue * (canvas.height / 3);
                
                const x = i * sliceWidth;
                const y = centerY - height; // Draw upwards
                
                points.push({ x, y });
            }

            // 2. Draw the line using midpoint quadratic curves for perfect smoothness
            ctx.moveTo(points[0].x, points[0].y);
            
            for (let i = 0; i < points.length - 1; i++) {
                // Calculate the midpoint between the current point and the next point
                const midX = (points[i].x + points[i + 1].x) / 2;
                const midY = (points[i].y + points[i + 1].y) / 2;
                
                // Curve *towards* the actual point, but end at the midpoint.
                // This ensures there are no sharp, jagged angles.
                ctx.quadraticCurveTo(points[i].x, points[i].y, midX, midY);
            }
            
            // Connect the very last point to finish the line off-screen
            ctx.lineTo(points[points.length - 1].x, points[points.length - 1].y);
            ctx.stroke();
        }

        draw();
    </script>
</body>
</html>
