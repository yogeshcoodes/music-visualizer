<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        * { margin: 0; padding: 0; }
        body { background: transparent; overflow: hidden; }
        canvas { display: block; width: 100vw; height: 100vh; background-color: #fff; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const NUM_BARS = 45;
        const BINS_TO_USE = 150; // only use first 150 frequency bins
        const MIN_BAR_THICKNESS = 2; // resting thickness (pixels)

        function draw() {
            requestAnimationFrame(draw);

            const W = canvas.width;
            const H = canvas.height;

            // ── White background (classic barcode look) ──────────
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, W, H);

            const data = window.parent.getVisualizerData ? window.parent.getVisualizerData() : null;
            const sliceWidth = W / NUM_BARS;
            const barHeight = H * 0.8;
            const barY = (H - barHeight) / 2;

            if (!data || !data.frequencyData) {
                // Idle: thin, even bars
                ctx.fillStyle = '#000000';
                for (let i = 0; i < NUM_BARS; i++) {
                    const x = i * sliceWidth + sliceWidth / 2;
                    const barWidth = MIN_BAR_THICKNESS;
                    ctx.fillRect(x - barWidth / 2, barY, barWidth, barHeight);
                }
                return;
            }

            const freqData = data.frequencyData;
            ctx.fillStyle = '#000000';

            for (let i = 0; i < NUM_BARS; i++) {
                const binIndex = Math.floor(i * (BINS_TO_USE / NUM_BARS));
                const amplitude = freqData[binIndex]; // 0–255

                // Map amplitude to bar thickness – maximum is 70% of slice width
                const maxThickness = sliceWidth * 0.7;
                const barWidth = MIN_BAR_THICKNESS + (amplitude / 255) * (maxThickness - MIN_BAR_THICKNESS);

                const x = i * sliceWidth + sliceWidth / 2 - barWidth / 2;
                ctx.fillRect(x, barY, barWidth, barHeight);
            }
        }

        draw();
    </script>
</body>
</html>
